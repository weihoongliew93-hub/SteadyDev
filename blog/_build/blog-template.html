</head>
<body>

  <div class="nav-overlay" id="navOverlay"></div>
  
  <header>
    <div class="header-content">
      <a href="../index.html" class="logo-link">
        <img src="../images/SteadyDevsLogo.svg" alt="SteadyDevs Logo" class="site-logo">
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="mainNav">
        <a href="../index.html">Home</a>
        <a href="../about.html">About</a>
        <a href="../services.html">Services</a>
        <div class="nav-dropdown">
          <a>Packages</a>
          <div class="dropdown-content">
            <a href="../packages.html">All Packages</a>
            <a href="../pricing-terms.html">Pricing & Terms</a>
          </div>
        </div>
        <a href="../portfolio.html">Portfolio</a>        <a href="index.html" class="active">Blog</a>
        <a href="../contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- TOC Toggle Button for Mobile/Tablet -->
    <button class="toc-toggle-btn" id="tocToggle" aria-label="Toggle table of contents" style="display: none;">
      ☰
    </button>
    
    <!-- Table of Contents -->
    <aside class="blog-toc" id="blogToc" style="display: none;">
      <div class="blog-toc-title">On This Page</div>
      <ul class="blog-toc-list" id="tocList"></ul>
    </aside>
    
    <main class="blog-content">
      <div id="blogContent" class="loading">
        <p>Loading blog post...</p>
      </div>
    </main>
  </div>

  <footer>
    <p>&copy; 2026 Steady Devs Solutions (SSM: 202603092285) | <a href="https://www.linkedin.com/company/steadydevs" target="_blank" rel="noopener" style="color: inherit; text-decoration: underline;">LinkedIn</a></p>
    <p style="margin-top: 8px;">Reliable solutions. Clear guidance. Less stress.</p>
  </footer>
  
  <!-- Sticky Mobile CTA -->
  <div class="sticky-cta" id="stickyCta">
    <a href="../contact.html">FREE Consultation →</a>
  </div>
  
  <!-- Back to Top Button -->
  <button id="backToTop" class="back-to-top" aria-label="Back to top" style="z-index: 9999;">↑</button>

  <script>
    // Get blog post slug from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const postSlug = urlParams.get('post');

    if (!postSlug) {
      document.getElementById('blogContent').innerHTML = '<div class="error"><h2>No blog post specified</h2><p><a href="index.html" style="color: #60A5FA;">Return to blog</a></p></div>';
    } else {
      loadBlogPost(postSlug);
    }

    async function loadBlogPost(slug) {
      try {
        const response = await fetch('blog-posts.json');
        const posts = await response.json();
        const post = posts.find(p => p.slug === slug);

        if (!post) {
          document.getElementById('blogContent').innerHTML = '<div class="error"><h2>Blog post not found</h2><p><a href="index.html" style="color: #60A5FA;">Return to blog</a></p></div>';
          return;
        }

        renderBlogPost(post);
      } catch (error) {
        console.error('Error loading blog post:', error);
        document.getElementById('blogContent').innerHTML = '<div class="error"><h2>Error loading blog post</h2><p>Please try again later.</p></div>';
      }
    }

    function renderBlogPost(post) {
      // Update meta tags
      document.getElementById('pageTitle').textContent = `${post.title} | SteadyDevs`;
      document.getElementById('pageDescription').setAttribute('content', post.excerpt);
      document.getElementById('ogUrl').setAttribute('content', `https://steadydevs.com/blog/blog-template.html?post=${post.slug}`);
      document.getElementById('ogTitle').setAttribute('content', post.title);
      document.getElementById('ogDescription').setAttribute('content', post.excerpt);
      
      // Update OG image if hero image exists
      if (post.heroImage) {
        document.getElementById('ogImage').setAttribute('content', `https://steadydevs.com/${post.heroImage}`);
      }

      // Render hero image if it exists
      let heroImageHtml = '';
      if (post.heroImage) {
        heroImageHtml = `<img src="../${post.heroImage}" alt="${post.heroImageAlt || post.title}" class="blog-hero-image">`;
      }

      // Render header
      let html = `
        <article>
          ${heroImageHtml}
          <div class="blog-header">
            <h1>${post.title}</h1>
            <div class="blog-meta">${post.dateDisplay} | ${post.readTime}</div>
          </div>
      `;

      // Render content
      post.content.forEach(block => {
        switch (block.type) {
          case 'paragraph':
            html += `<p>${block.text}</p>`;
            break;
          case 'heading2':
            html += `<h2>${block.text}</h2>`;
            break;
          case 'heading3':
            html += `<h3>${block.text}</h3>`;
            break;
          case 'list':
            html += `<ul>${block.items.map(item => `<li>${item}</li>`).join('')}</ul>`;
            break;
          case 'orderedList':
            html += `<ol>${block.items.map(item => `<li>${item}</li>`).join('')}</ol>`;
            break;
          case 'warning':
            html += `<div class="warning-box"><p>${block.text}</p></div>`;
            break;
          case 'tip':
            html += `<div class="tip-box"><p>${block.text}</p></div>`;
            break;
          case 'cta':
            html += `
              <div class="cta-box">
                <h3>${block.title}</h3>
                <p style="color: #D1D5DB;">${block.text}</p>
                <a href="${block.buttonLink}" class="cta-button">${block.buttonText}</a>
              </div>
            `;
            break;
          case 'image':
            html += `
              <figure style="margin: 30px 0;">
                <img src="../${block.src}" alt="${block.alt}" style="width: 100%; border-radius: 8px;">
                ${block.caption ? `<figcaption style="text-align: center; color: #9CA3AF; font-size: 0.95em; margin-top: 10px; font-style: italic;">${block.caption}</figcaption>` : ''}
              </figure>
            `;
            break;
          case 'faq':
            html += `
              <div class="faq-section">
                <h2>${block.title || 'Frequently Asked Questions'}</h2>
                ${block.items.map((item, index) => `
                  <div class="faq-item" data-faq-index="${index}">
                    <div class="faq-question">
                      <span class="faq-question-text">${item.question}</span>
                      <span class="faq-toggle">+</span>
                    </div>
                    <div class="faq-answer">
                      <p>${item.answer}</p>
                    </div>
                  </div>
                `).join('')}
              </div>
            `;
            break;
        }
      });

      html += '</article>';
      document.getElementById('blogContent').innerHTML = html;
      
      // Set up FAQ toggles
      setupFaqToggles();
      
      // Generate table of contents after content is rendered
      generateTableOfContents();
    }
    
    // FAQ Toggle functionality
    function setupFaqToggles() {
      const faqQuestions = document.querySelectorAll('.faq-question');
      
      faqQuestions.forEach(question => {
        question.addEventListener('click', () => {
          const faqItem = question.parentElement;
          const isActive = faqItem.classList.contains('active');
          
          // Close all other FAQs
          document.querySelectorAll('.faq-item').forEach(item => {
            item.classList.remove('active');
          });
          
          // Toggle current FAQ
          if (!isActive) {
            faqItem.classList.add('active');
          }
        });
      });
    }
    
    // Generate Table of Contents
    function generateTableOfContents() {
      const content = document.getElementById('blogContent');
      const headings = content.querySelectorAll('h2, h3');
      const tocList = document.getElementById('tocList');
      const tocContainer = document.getElementById('blogToc');
      
      if (headings.length === 0) {
        return; // No headings, don't show TOC
      }
      
      // Add IDs to headings for anchor links
      headings.forEach((heading, index) => {
        if (!heading.id) {
          heading.id = `heading-${index}`;
        }
      });
      
      // Build TOC list
      let tocHTML = '';
      headings.forEach((heading) => {
        const level = heading.tagName.toLowerCase();
        const text = heading.textContent;
        const id = heading.id;
        
        tocHTML += `
          <li class="blog-toc-item blog-toc-item-${level}">
            <a href="#${id}" class="blog-toc-link" data-target="${id}">${text}</a>
          </li>
        `;
      });
      
      tocList.innerHTML = tocHTML;
      tocContainer.style.display = 'block';
      
      // Show TOC toggle button on mobile/tablet
      const tocToggleBtn = document.getElementById('tocToggle');
      if (window.innerWidth <= 1400) {
        tocToggleBtn.style.display = 'block';
      }
      
      // Add click handlers for smooth scrolling
      const tocLinks = tocList.querySelectorAll('.blog-toc-link');
      tocLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const targetId = link.getAttribute('data-target');
          const targetElement = document.getElementById(targetId);
          if (targetElement) {
            targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // Close TOC on mobile/tablet after clicking a link
            if (window.innerWidth <= 1400) {
              tocContainer.classList.remove('toc-visible');
            }
          }
        });
      });
      
      // Set up scroll tracking
      setupScrollTracking(headings);
    }
    
    // Track scroll position and highlight active section
    function setupScrollTracking(headings) {
      const tocLinks = document.querySelectorAll('.blog-toc-link');
      
      function updateActiveLink() {
        const scrollPosition = window.scrollY + 120; // Offset for fixed header
        
        let currentHeading = null;
        
        headings.forEach((heading) => {
          const headingTop = heading.offsetTop;
          if (scrollPosition >= headingTop) {
            currentHeading = heading;
          }
        });
        
        // Remove all active classes
        tocLinks.forEach(link => link.classList.remove('active'));
        
        // Add active class to current section
        if (currentHeading) {
          const activeLink = document.querySelector(`[data-target="${currentHeading.id}"]`);
          if (activeLink) {
            activeLink.classList.add('active');
          }
        }
      }
      
      // Update on scroll with throttling for performance
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (!ticking) {
          window.requestAnimationFrame(() => {
            updateActiveLink();
            ticking = false;
          });
          ticking = true;
        }
      });
      
      // Initial update
      updateActiveLink();
    }

    // Mobile Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const navOverlay = document.getElementById('navOverlay');
    const mainNav = document.getElementById('mainNav');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      mainNav.classList.toggle('active');
      navOverlay.classList.toggle('active');
    });

    navOverlay.addEventListener('click', () => {
      menuToggle.classList.remove('active');
      mainNav.classList.remove('active');
      navOverlay.classList.remove('active');
    });
    
    // Back to Top Button
    const backToTop = document.getElementById('backToTop');
    
    window.addEventListener('scroll', () => {
      if (window.pageYOffset > 500) {
        backToTop.classList.add('visible');
      } else {
        backToTop.classList.remove('visible');
      }
    });
    
    backToTop.addEventListener('click', () => {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });
    
    // TOC Toggle for Mobile/Tablet
    const tocToggleBtn = document.getElementById('tocToggle');
    const tocContainer = document.getElementById('blogToc');
    
    if (tocToggleBtn) {
      tocToggleBtn.addEventListener('click', () => {
        tocContainer.classList.toggle('toc-visible');
      });
      
      // Close TOC when clicking outside
      document.addEventListener('click', (e) => {
        if (window.innerWidth <= 1400 && 
            !tocContainer.contains(e.target) && 
            !tocToggleBtn.contains(e.target) &&
            tocContainer.classList.contains('toc-visible')) {
          tocContainer.classList.remove('toc-visible');
        }
      });
      
      // Hide/show toggle button based on window resize
      window.addEventListener('resize', () => {
        if (window.innerWidth > 1400) {
          tocToggleBtn.style.display = 'none';
          tocContainer.classList.remove('toc-visible');
        } else if (tocContainer.style.display === 'block') {
          tocToggleBtn.style.display = 'block';
        }
      });
    }
  </script>
</body>
</html>
