<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Large, clear version of stacked blocks logo for business card -->
  <defs>
    <linearGradient id="grad1-large" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2-large" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3-large" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4-large" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Bottom left block - lightest -->
  <rect x="35" y="120" width="55" height="55" rx="10" 
        fill="url(#grad1-large)" 
        stroke="#60a5fa" 
        stroke-width="3"
        filter="url(#shadow)"/>
  
  <!-- Right tall block -->
  <rect x="95" y="80" width="55" height="95" rx="10" 
        fill="url(#grad2-large)" 
        stroke="#3b82f6" 
        stroke-width="3"
        filter="url(#shadow)"/>
  
  <!-- Middle left block -->
  <rect x="35" y="55" width="55" height="55" rx="10" 
        fill="url(#grad3-large)" 
        stroke="#2563eb" 
        stroke-width="3"
        filter="url(#shadow)"/>
  
  <!-- Top right block - darkest -->
  <rect x="95" y="15" width="55" height="55" rx="10" 
        fill="url(#grad4-large)" 
        stroke="#1e3a8a" 
        stroke-width="3"
        filter="url(#shadow)"/>
</svg>
