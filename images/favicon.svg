<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked blocks favicon - centered -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bottom left block - lightest -->
  <rect x="7" y="24" width="11" height="11" rx="2" fill="url(#grad1)" stroke="#60a5fa" stroke-width="1.5"/>
  
  <!-- Right tall block -->
  <rect x="19" y="16" width="11" height="19" rx="2" fill="url(#grad2)" stroke="#3b82f6" stroke-width="1.5"/>
  
  <!-- Middle left block -->
  <rect x="7" y="11" width="11" height="11" rx="2" fill="url(#grad3)" stroke="#2563eb" stroke-width="1.5"/>
  
  <!-- Top right block - darkest -->
  <rect x="19" y="3" width="11" height="11" rx="2" fill="url(#grad4)" stroke="#1e3a8a" stroke-width="1.5"/>
</svg>
